workflows:
  ios-testflight:
    name: iOS - TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: spikers_app

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.jerusalem.spikers

      groups:
        - app_store_credentials

    integrations:
      app_store_connect: spikers-fable

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Flutter analyze
        script: flutter analyze
        ignore_failure: true

      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles

      # ✅ AUTO INCREMENT BUILD NUMBER
      - name: Update build number automatically
        script: |
          CURRENT=$(grep "^version:" pubspec.yaml | sed "s/.*+//")
          NEW_BUILD=$((CURRENT + 1))

          sed -i.bak "s/^version: \(.*\)+[0-9]\+/version: \1+$NEW_BUILD/" pubspec.yaml
          rm -f pubspec.yaml.bak

          echo "New build number: $NEW_BUILD"

      - name: Build iOS (IPA for distribution)
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

      email:
        recipients:
          - mhamadadmare11@gmail.com
        notify:
          success: true
          failure: true