name: spikers_app
description: "Jerusalem Spikers Volleyball Club App"
publish_to: 'none'

version: 1.0.1+22
# comment: "version: x.y.z+build_number" where:

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_messaging: ^15.2.5
  cloud_functions: ^5.4.5

  firebase_storage: ^12.4.0

  # Security
  firebase_app_check: ^0.3.2

  # State management / routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Persistence
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4

  # i18n
  intl: ^0.20.2

  # Font (Cairo — Arabic + Latin in one family)
  google_fonts: ^6.2.1

  image_picker: ^1.1.2

  # UI utilities
  shimmer: ^3.0.0
  omni_datetime_picker: ^2.0.5
  cached_network_image: ^3.4.1
  permission_handler: ^12.0.3
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_cloud_firestore: ^3.1.0
  firebase_auth_mocks: ^0.14.1
  mocktail: ^1.0.4
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true
  background_color_ios: "#ffffff"
  adaptive_icon_background: "#0D1B3E"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/cards/
